<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>пока горит свет</title>
<style>
  :root{
    --ink:#f3ece0;        /* тёплый кремовый текст */
    --ink-dim:#cdbfa8;
    --glow:#ffc879;       /* свет из окон */
    --glow-soft:#f0a85f;
    --sky-top:#1b2138;    /* глубокий сумеречный индиго */
    --sky-mid:#3a3552;
    --sky-low:#b5734f;    /* тёплый горизонт */
    --house:#2a2636;
    --house-dark:#1d1a28;
    --ground:#1a1622;
    --paper:#15121c;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #2a2440 0%, #100d18 70%, #0a0810 100%);
    min-height:100%;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .card{
    position:relative;
    width:min(460px,100%);
    aspect-ratio:3/4;
    border-radius:6px;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 30px 80px -20px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.04);
    background:var(--paper);
    user-select:none;
  }
  .card:focus-visible{outline:2px solid var(--glow); outline-offset:3px}

  /* ───────── сцена (дом на закате) ───────── */
  .scene{
    position:absolute; inset:0;
    transition:filter .8s ease, transform .8s ease, opacity .8s ease;
    will-change:filter,transform;
  }
  .scene svg{display:block; width:100%; height:100%}

  /* мягкое зерно/виньетка поверх — настроение плёнки */
  .grain{
    position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(110% 90% at 50% 30%, transparent 55%, rgba(0,0,0,.55) 100%);
    mix-blend-mode:multiply;
  }

  /* ───────── обложечный текст ───────── */
  .cover{
    position:absolute; inset:0;
    display:flex; flex-direction:column; justify-content:flex-end;
    padding:34px 30px 30px;
    transition:opacity .55s ease;
    z-index:2;
  }
  .eyebrow{
    font-size:11px; letter-spacing:.42em; text-transform:uppercase;
    color:var(--ink-dim); margin:16px 0 0;
  }
  .title{
    margin:0;
    font-weight:400;
    font-size:clamp(34px,9vw,46px);
    line-height:.98;
    letter-spacing:.01em;
    color:var(--ink);
    text-shadow:0 2px 24px rgba(0,0,0,.55);
  }
  .hint{
    margin-top:22px;
    align-self:flex-start;
    display:inline-flex; align-items:center; gap:9px;
    padding:9px 16px;
    border:1px solid rgba(243,236,224,.35);
    border-radius:999px;
    font-size:12px; letter-spacing:.3em; text-transform:uppercase;
    color:var(--ink);
    backdrop-filter:blur(2px);
  }
  .hint .dot{
    width:7px; height:7px; border-radius:50%;
    background:var(--glow);
    box-shadow:0 0 10px var(--glow);
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.4; transform:scale(.85)}50%{opacity:1; transform:scale(1.25)}}

  /* ───────── карточка с деталями (раскрытие) ───────── */
  .info{
    position:absolute; inset:0;
    display:flex; flex-direction:column; justify-content:center;
    gap:6px;
    padding:40px 34px;
    opacity:0; visibility:hidden;
    transform:translateY(10px);
    transition:opacity .7s ease .15s, transform .7s ease .15s, visibility 0s linear .85s;
    z-index:3;
    color:var(--ink);
  }
  .info .liner{
    font-size:11px; letter-spacing:.4em; text-transform:uppercase;
    color:var(--glow-soft); margin:0 0 18px;
  }
  .row{ margin:0 0 16px; }
  .row .k{
    display:block;
    font-family:"SF Mono",ui-monospace,"Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
    font-size:10.5px; letter-spacing:.28em; text-transform:uppercase;
    color:var(--ink-dim); margin-bottom:5px;
  }
  .row .v{
    font-size:18px; line-height:1.4; color:var(--ink);
  }
  .info .line{
    margin-top:8px;
    font-style:italic;
    font-size:15px; line-height:1.5;
    color:var(--glow);
    text-wrap:balance;
  }
  .back{
    margin-top:26px; align-self:flex-start;
    font-family:ui-monospace,monospace;
    font-size:11px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--ink-dim);
    border:0; background:none; padding:0; cursor:pointer;
  }
  .back:hover{color:var(--ink)}

  /* ───────── состояние «открыто» ───────── */
  .card.open .scene{ filter:blur(16px) brightness(.45) saturate(1.15); transform:scale(1.1); }
  .card.open .cover{ opacity:0; pointer-events:none; }
  .card.open .info{ opacity:1; visibility:visible; transform:none; transition:opacity .7s ease .15s, transform .7s ease .15s, visibility 0s; }

  @media (prefers-reduced-motion:reduce){
    .scene,.cover,.info{transition:opacity .3s ease}
    .card.open .scene{transform:none; filter:blur(14px) brightness(.45)}
    .hint .dot{animation:none}
  }
</style>

<div class="card" id="card" role="button" tabindex="0" aria-label="Открыть приглашение">

  <div class="scene" aria-hidden="true">
    <!-- стилизованный дом на закате (оригинальная иллюстрация, не обложка) -->
    <svg viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0"  stop-color="var(--sky-top)"/>
          <stop offset="0.55" stop-color="var(--sky-mid)"/>
          <stop offset="0.86" stop-color="var(--sky-low)"/>
          <stop offset="1"  stop-color="#7a4733"/>
        </linearGradient>
        <radialGradient id="porch" cx="50%" cy="50%" r="50%">
          <stop offset="0" stop-color="var(--glow)" stop-opacity=".95"/>
          <stop offset="1" stop-color="var(--glow)" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ffe1a6"/>
          <stop offset="1" stop-color="var(--glow-soft)"/>
        </linearGradient>
      </defs>

      <!-- небо -->
      <rect width="600" height="800" fill="url(#sky)"/>
      <!-- звёзды -->
      <g fill="#fdf6e6" opacity=".75">
        <circle cx="80"  cy="70"  r="1.6"/>
        <circle cx="150" cy="120" r="1.1"/>
        <circle cx="500" cy="60"  r="1.7"/>
        <circle cx="430" cy="110" r="1"/>
        <circle cx="320" cy="55"  r="1.3"/>
        <circle cx="560" cy="160" r="1.2"/>
        <circle cx="40"  cy="180" r="1"/>
      </g>

      <!-- дальние деревья -->
      <g fill="#241f33" opacity=".9">
        <ellipse cx="70"  cy="540" rx="90"  ry="120"/>
        <ellipse cx="540" cy="560" rx="110" ry="140"/>
      </g>

      <!-- земля -->
      <rect y="600" width="600" height="200" fill="var(--ground)"/>

      <!-- дом -->
      <g>
        <!-- корпус -->
        <rect x="150" y="330" width="300" height="290" fill="var(--house)"/>
        <!-- крыша -->
        <polygon points="135,335 300,225 465,335" fill="var(--house-dark)"/>
        <!-- труба -->
        <rect x="380" y="258" width="34" height="70" fill="var(--house-dark)"/>

        <!-- окна второго этажа -->
        <rect x="190" y="370" width="58" height="70" fill="url(#win)"/>
        <rect x="352" y="370" width="58" height="70" fill="url(#win)"/>
        <!-- переплёты -->
        <g stroke="var(--house-dark)" stroke-width="4">
          <line x1="219" y1="370" x2="219" y2="440"/>
          <line x1="190" y1="405" x2="248" y2="405"/>
          <line x1="381" y1="370" x2="381" y2="440"/>
          <line x1="352" y1="405" x2="410" y2="405"/>
        </g>

        <!-- окно первого этажа (тёплый свет ярче) -->
        <rect x="190" y="490" width="70" height="90" fill="url(#win)"/>
        <g stroke="var(--house-dark)" stroke-width="4">
          <line x1="225" y1="490" x2="225" y2="580"/>
          <line x1="190" y1="535" x2="260" y2="535"/>
        </g>

        <!-- дверь -->
        <rect x="330" y="500" width="62" height="120" fill="var(--house-dark)"/>
        <rect x="336" y="510" width="50" height="60" fill="url(#win)" opacity=".85"/>
        <circle cx="380" cy="565" r="3" fill="var(--glow)"/>

        <!-- фонарь над крыльцом -->
        <circle cx="361" cy="492" r="34" fill="url(#porch)"/>
        <circle cx="361" cy="492" r="4.5" fill="var(--glow)"/>
      </g>

      <!-- ближнее дерево слева -->
      <g fill="#1c1828">
        <rect x="56" y="430" width="14" height="190"/>
        <ellipse cx="63" cy="420" rx="60" ry="74"/>
      </g>
    </svg>
  </div>

  <div class="grain" aria-hidden="true"></div>

  <!-- обложка -->
  <div class="cover">
    <h1 class="title">пока<br>горит свет</h1>
    <p class="eyebrow">side a · 27.06</p>
    <span class="hint"><span class="dot"></span>клик</span>
  </div>

  <!-- раскрытие -->
  <div class="info" id="info">
    <p class="liner">side b · tracklist</p>

    <div class="row">
      <span class="k">дата</span>
      <span class="v">27 июня · сбор в 15:30</span>
    </div>
    <div class="row">
      <span class="k">место</span>
      <span class="v">дача во Фрязино</span><br/>
      <span class="v">​д. Новофрязино, Улица Островского, 12е</span>
    </div>
    <div class="row">
      <span class="k">дресс-код</span>
      <span class="v">уютный вайб — фланель, оверсайз, кеды, побольше слоёв</span>
    </div>

    <!-- ↓ оригинальная строка в духе American Football. замени, если хочешь свою -->
    <p class="line">we'll leave the porch light on for you.</p>

    <button class="back" id="back" type="button">← назад</button>
  </div>
</div>

<script>
  const card = document.getElementById('card');
  const back = document.getElementById('back');

  function open(){ card.classList.add('open'); card.setAttribute('aria-label','Приглашение'); }
  function close(){ card.classList.remove('open'); card.setAttribute('aria-label','Открыть приглашение'); }

  card.addEventListener('click', (e)=>{
    if(e.target === back) return;          // клик по «назад» не открывает заново
    card.classList.contains('open') ? null : open();
  });
  card.addEventListener('touchstart', (e)=>{
    if(e.target === back) return;          // клик по «назад» не открывает заново
    card.classList.contains('open') ? null : open();
  });
  card.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); card.classList.contains('open') ? close() : open(); }
  });
  back.addEventListener('click', (e)=>{ e.stopPropagation(); close(); });
  back.addEventListener('touchstart', (e)=>{ e.stopPropagation(); close(); });
</script>
